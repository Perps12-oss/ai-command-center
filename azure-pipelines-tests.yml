# Azure Pipelines configuration for the AI Command Center risk-area suite.
#
# The portable suite runs on Microsoft-hosted Windows; the hard ARM64 binary
# gate runs on a self-hosted native ARM64 agent (define an agent pool named
# "ARM64-Windows" - see README_TESTING.md).

trigger:
  branches:
    include: [main]

pr:
  branches:
    include: ["*"]

stages:
  - stage: PortableSuite
    displayName: "Risk-area suite (hosted Windows x64)"
    jobs:
      - job: pytest
        pool:
          vmImage: "windows-latest"
        strategy:
          matrix:
            py311:
              pythonVersion: "3.11"
            py312:
              pythonVersion: "3.12"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements-test.txt
            displayName: "Install test deps"

          - script: python scripts/arch_lint.py --baseline tests/arch_lint_baseline.json
            displayName: "Architecture lint (risk #2)"

          - script: >-
              bandit -r ai_command_center --ini .bandit
              --baseline tests/bandit_baseline.json --severity-level high
            displayName: "Bandit (risk #3)"

          - script: >-
              python -m pytest -p no:cacheprovider
              --junitxml=junit/test-results.xml
            displayName: "pytest (incl. slow)"

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFiles: "junit/test-results.xml"
              testRunTitle: "risk-area $(pythonVersion)"

          - task: PublishCodeCoverageResults@2
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: "$(System.DefaultWorkingDirectory)/coverage.xml"

  - stage: ARM64Gate
    displayName: "Native ARM64 hard gate"
    dependsOn: PortableSuite
    condition: succeeded()
    jobs:
      - job: arm64
        # Requires a self-hosted native ARM64 Windows agent in this pool.
        pool:
          name: "ARM64-Windows"
        steps:
          - script: python -c "import platform,sys;m=platform.machine().upper();print(m);sys.exit(0 if m=='ARM64' else 1)"
            displayName: "Confirm native ARM64 interpreter"
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements-test.txt
            displayName: "Install test deps"
          - script: python scripts/check_arm64_binaries.py
            displayName: "HARD GATE - no x64 binaries (risk #1)"
          - script: python -m pytest -p no:cacheprovider
            displayName: "Full suite incl. ARM64-only tests"
