# UCGS v5 project configuration
# Run: python tools/ucgs_runner.py

ucgs_version: v5
profile: ai-command-center
phase: "transformation"
enforcement_mode: block  # Phase 2 local block; CI uses UCGS_ENFORCEMENT in ucgs.yml
# Legacy debt grandfather (arch boundary ratchet): tests/arch_lint_baseline.json

rules:
  large_commit:
    max_files: 25
    max_added_lines: 500
    severity: S2

  forbidden_patterns:
    - id: secrets_in_diff
      pattern: '(?i)(api[_-]?key|secret[_-]?key|password\s*=|token\s*=)\s*["''][^"'']+["'']'
      severity: S4
      classification: CRITICAL
      message: "Possible secret committed in diff"
      remediation: "Remove secret and use environment variables or a secret manager."

  # contract_lock files/required_fields merged from ucgs.profiles/ai-command-center.yaml
