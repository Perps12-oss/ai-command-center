name: Tom's Implementation Audit

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  issue_comment:
    types: [created]

# Cancel superseded runs on the same PR.
concurrency:
  group: tom-audit-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  tom-audit:
    name: Tom's Implementation Audit
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/tom-audit'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Tom's Architecture Audit
        id: tom-audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.event.repository.owner.login }}
        run: |
          # Install Python dependencies
          python3 -m pip install --upgrade pip > /dev/null 2>&1
          pip install PyGithub > /dev/null 2>&1

          # Run Tom's audit script
          python3 << 'TOM_SCRIPT'
          import os
          import sys
          import json
          from datetime import datetime
          from github import Github

          # Get environment variables
          token = os.environ.get("GITHUB_TOKEN")
          pr_number = int(os.environ.get("PR_NUMBER", 0))
          repo_name = os.environ.get("REPO_NAME", "")
          repo_owner = os.environ.get("REPO_OWNER", "")

          if not token or not pr_number:
              print("ERROR: Missing required environment variables")
              sys.exit(1)

          # Initialize GitHub client
          g = Github(token)
          repo = g.get_repo(f"{repo_owner}/{repo_name}")
          pr = repo.get_pull(pr_number)

          # Get PR details
          title = pr.title
          body = pr.body or ""
          head_sha = pr.head.sha
          base_branch = pr.base.ref
          head_branch = pr.head.ref
          changed_files = pr.get_files()
          additions = pr.additions
          deletions = pr.deletions
          changed_file_count = pr.changed_files

          # Get recent commits
          commits = list(pr.get_commits())
          recent_commits = [
              {
                  "sha": c.sha[:8],
                  "message": c.commit.message.split('\n')[0][:100],
                  "author": c.author.login if c.author else "unknown"
              }
              for c in commits[-5:]
          ]

          # Check for test coverage
          changed_test_files = [f.filename for f in changed_files if 'test' in f.filename.lower()]
          
          # Check for new dependencies
          dependency_files = ['requirements.txt', 'requirements-test.txt', 'pyproject.toml', 'setup.py']
          changed_deps = [f.filename for f in changed_files if f.filename in dependency_files]

          # Build audit report
          audit_report = f"""
          ## 🕵️ Tom's Implementation Audit Report

          **PR:** #{pr_number} - {title}
          **Branch:** `{head_branch}` → `{base_branch}`
          **Commit:** `{head_sha[:8]}`
          **Author:** @{pr.user.login}

          ---

          ### 📊 PR Statistics
          | Metric | Value |
          |--------|-------|
          | Changed Files | {changed_file_count} |
          | Additions | +{additions} |
          | Deletions | -{deletions} |
          | Commits | {len(commits)} |
          | Test Files Modified | {len(changed_test_files)} |

          ---

          ### 📝 Recent Commits
          """

          for commit in recent_commits:
              audit_report += f"- `{commit['sha']}` - {commit['message']} (@{commit['author']})\n"

          # Build compliance checklist
          checklist_items = []

          # Check 1: Test coverage
          if changed_test_files:
              checklist_items.append(f"✅ **Test Coverage:** {len(changed_test_files)} test file(s) modified")
          else:
              checklist_items.append("⚠️ **Test Coverage:** No test files modified")

          # Check 2: Architecture compliance
          critical_files = [
              'ai_command_center/repositories/',
              'ai_command_center/services/',
              'ai_command_center/domain/',
              'ai_command_center/core/',
          ]
          arch_changes = [f.filename for f in changed_files 
                        if any(cf in f.filename for cf in critical_files)]
          if arch_changes:
              checklist_items.append(f"✅ **Architecture Layer:** {len(arch_changes)} architecture file(s) modified")

          # Check 3: Constitution compliance
          constitution_files = [f.filename for f in changed_files 
                             if 'constitution' in f.filename.lower() or 'ARCHITECTURE' in f.filename.upper()]
          if constitution_files:
              checklist_items.append(f"📜 **Constitution/Docs:** {len(constitution_files)} document(s) modified")

          # Check 4: Dependency changes
          if changed_deps:
              checklist_items.append(f"⚠️ **Dependencies:** {len(changed_deps)} dependency file(s) modified - review required")
          else:
              checklist_items.append("✅ **Dependencies:** No dependency files modified")

          # Check 5: Breaking changes
          breaking_keywords = ['BREAKING', 'MAJOR', 'DESTROY', 'DELETE']
          has_breaking = any(kw in body.upper() for kw in breaking_keywords)
          if has_breaking:
              checklist_items.append("🚨 **Breaking Changes:** Detected - manual review required")
          else:
              checklist_items.append("✅ **Breaking Changes:** None detected")

          audit_report += "\n### ✅ Compliance Checklist\n\n"
          for item in checklist_items:
              audit_report += f"- {item}\n"

          # Phase-specific checks
          phase_keywords = ['phase1', 'phase2', 'phase3', 'phase4', 'phase5', 'phase6']
          mentioned_phases = [kw for kw in phase_keywords if kw.lower() in (title + body).lower()]
          
          audit_report += f"""

          ---

          ### 🎯 Phase Implementation Notes
          """
          if mentioned_phases:
              audit_report += f"\n**Mentioned Phases:** {', '.join(mentioned_phases)}\n"
          else:
              audit_report += "\n_No specific phase mentioned in PR description._\n"

          # Critical files check
          critical_patterns = [
              ('world_model_repository', 'Phase 2 Persistence'),
              ('brain_runtime_service', 'Brain Runtime'),
              ('brain_kernel_service', 'Brain Kernel'),
              ('service_factory', 'Service Wiring'),
              ('app_state', 'AppState'),
          ]
          
          audit_report += """
          ### 🔍 Critical Component Analysis
          """
          for pattern, component in critical_patterns:
              matching = [f.filename for f in changed_files if pattern in f.filename]
              if matching:
                  audit_report += f"- **{component}:** Modified → `{'`, `'.join(matching[:3])}`\n"
              else:
                  audit_report += f"- **{component}:** No changes\n"

          # Final verdict
          issues_found = len([c for c in checklist_items if c.startswith("⚠️") or c.startswith("🚨")])
          
          audit_report += f"""

          ---

          ### 📋 Audit Summary

          | Check | Status |
          |-------|--------|
          | Test Coverage | {"⚠️ Review Needed" if not changed_test_files else "✅ Covered"} |
          | Architecture | {"✅ Modified" if arch_changes else "✅ Unchanged"} |
          | Dependencies | {"⚠️ Modified" if changed_deps else "✅ Unchanged"} |
          | Breaking Changes | {"🚨 Detected" if has_breaking else "✅ None"} |

          ---

          ### 🎯 Tom's Verdict

          **Implementation Quality:** {"PASS ✅" if issues_found == 0 else "REVIEW ⚠️"}

          """
          if issues_found > 0:
              audit_report += f"""
          ⚠️ **{issues_found} item(s) require attention.** Please review the checklist above.
          """
          else:
              audit_report += """
          ✅ *Implementation appears compliant with ACC architecture standards.*
          """

          audit_report += f"""

          ---
          *Audit generated by Tom's Implementation Auditor • {datetime.now().strftime('%Y-%m-%d %H:%M:%S')} UTC*
          *Commit: `{head_sha[:8]}`*
          """

          # Post comment to PR
          pr.create_issue_comment(audit_report)
          print("✅ Tom's audit report posted successfully!")
          print(f"   PR: {title}")
          print(f"   Files: {changed_file_count}, Additions: +{additions}, Deletions: -{deletions}")
          TOM_SCRIPT

      - name: Report Success
        run: |
          echo "✅ Tom's audit completed for PR #${{ github.event.pull_request.number || github.event.issue.number }}"
