name: UCGS Architecture Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ucgs-check:
    runs-on: ubuntu-latest
    env:
      # Track 2 Stage 3 (UCGS Phase 3): block merges on FAIL / S4 / S5.
      # Draft PR escape hatch: set UCGS_ENFORCEMENT=warn in workflow_dispatch override only.
      UCGS_ENFORCEMENT: block

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml gitpython

      - name: Run Constitution Gate
        run: python scripts/verify_constitution.py

      - name: Run UCGS v5 Gate
        run: python tools/ucgs_runner.py > ucgs_report.yaml

      - name: Evaluate Verdict
        run: python tools/ucgs_ci_gate.py ucgs_report.yaml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt -r requirements-test.txt

      - name: Ruff check
        run: python -m ruff check ai_command_center

      - name: Pytest
        run: python -m pytest tests -q

      - name: Upload UCGS report
        uses: actions/upload-artifact@v4
        with:
          name: ucgs-report
          path: ucgs_report.yaml
