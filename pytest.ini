[pytest]
# Test configuration for the AI Command Center risk-area test suite.
#
# Coverage is enabled by default via pytest-cov. If you do not have the test
# requirements installed, run:  pip install -r requirements-test.txt
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --strict-config
    --cov=ai_command_center
    --cov-report=term-missing
    --cov-report=xml

# Long-running / environment-specific tests are opt-in via markers so the
# default `pytest` run stays fast and CI-friendly.
markers =
    slow: long-running soak/chaos tests (deselect with -m "not slow")
    windows: requires a real Windows host (skipped elsewhere)
    arm64: requires native Windows ARM64 (skipped on x64 / emulated hosts)
    security: prompt-injection / sandbox / path-traversal hardening tests

# Fail loudly instead of hanging forever if a test deadlocks.
timeout = 120
